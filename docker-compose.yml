services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: news-platform-app
    volumes:
      - app_data:/var/www
    networks:
      - news-network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: news-platform-nginx
    ports:
      - "8080:80"
    volumes:
      - app_data:/var/www:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - news-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: news-platform-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: news_platform
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - news-network

volumes:
  app_data:
  db_data:

networks:
  news-network:
    driver: bridge
